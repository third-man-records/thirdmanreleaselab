      /*body {

      .box {
        display: block;
        width: 75px;
        height: 75px;
        border-radius: 12px;
        background-image: linear-gradient(114.41deg, rgb(10, 228, 72) 20.74%, rgb(171, 255, 132) 65.5%), url(https://assets.codepen.io/16327/noise-e82662fe.png)
      }
      .cafewall {
        --x: 10vh;
        --y: calc(var(--x) * 2 / 3);
        --hy: calc(var(--y) / 2);
        --qx: calc(var(--x) / 4);
        background:
          linear-gradient(#0000 93%, #666 0) 0 0 / var(--x) var(--hy),
          conic-gradient(#fff 25%, #0000 0 75%, #000 0) 0 0 / var(--x) var(--y),
          conic-gradient(#fff 25%, #0000 0 75%, #000 0) var(--qx) var(--hy) / var(--x) var(--y);
        transition: background-position .25s;
        margin: 0;
        height: 50vh;
      }
      .cafewall:hover {
        background-position: 0 0, 0 0, 0 var(--hy);
      }

    </style>
    <div class="cafewall"></div>
    <div class="box green"></div>
    <script type="text/javascript">
      console.log('loaded');
      gsap.fromTo(".box", { 
        x: 900,
      }, {
        x: 400,
        fill: 'blue'
      });
    </script>
  </body>
